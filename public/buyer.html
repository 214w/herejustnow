<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Here? | HereJustNow Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; }
        .scanner-line { height: 2px; background: linear-gradient(90deg, transparent, #10b981, transparent); width: 100%; position: absolute; top: 0; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col p-6">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black text-emerald-500 tracking-tighter">HereJustNow</h1>
        <div class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-xs font-bold animate-pulse">LIVE SCANNING</div>
    </header>
    <div class="relative h-1 bg-zinc-900 overflow-hidden mb-8 rounded-full"><div class="scanner-line"></div></div>
    <main class="flex-grow space-y-4">
        <h2 class="text-sm uppercase tracking-widest text-gray-500 font-bold mb-4">Nearby Now (within 10 miles)</h2>
        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center hover:border-emerald-500/50 transition-all cursor-pointer">
            <div><h3 class="text-lg font-bold text-white">Midnight Tacos 🌮</h3><p class="text-sm text-gray-400">0.4 miles away • Deep Ellum</p></div>
            <div class="text-right"><div class="text-emerald-500 font-mono font-bold text-xl">42:15</div><div class="text-[10px] text-gray-500 uppercase">Vanish in</div></div>
        </div>
    </main>
    <footer class="mt-12 text-center"><a href="index.html" class="text-gray-500 text-xs hover:text-emerald-500 transition-colors uppercase tracking-widest font-bold">← Back to Home</a></footer>
</body>
</html>
