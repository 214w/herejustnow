<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HereJustNow | Live. Local. Gone.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Helper to render Lucide icons in a browser/CDN environment
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconHtml, setIconHtml] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        setIconHtml(icon.toSvg({ width: size, height: size, class: className }));
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };

        const MapPin = (props) => <Icon name="MapPin" {...props} />;
        const Clock = (props) => <Icon name="Clock" {...props} />;
        const ArrowLeft = (props) => <Icon name="ArrowLeft" {...props} />;
        const Zap = (props) => <Icon name="Zap" {...props} />;
        const PlusCircle = (props) => <Icon name="PlusCircle" {...props} />;
        const Search = (props) => <Icon name="Search" {...props} />;

        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [feed, setFeed] = useState([
                { id: 1, type: 'drop', title: 'Fresh Sourdough Loaves', desc: 'Just pulled 4 loaves out of the oven.', price: '$8/each', time: 54, distance: '0.1 mi' },
                { id: 2, type: 'shout', title: 'Need a jumpstart ASAP', desc: 'Car battery died at CVS.', price: 'Will tip $20', time: 42, distance: '0.3 mi' }
            ]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setFeed(prev => prev.map(post => ({
                        ...post,
                        time: Math.max(0, post.time - 1)
                    })).filter(post => post.time > 0));
                }, 60000);
                return () => clearInterval(timer);
            }, []);

            const handlePost = (type, e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newPost = {
                    id: Date.now(),
                    type: type,
                    title: formData.get('title'),
                    desc: formData.get('desc'),
                    price: formData.get('price'),
                    time: 60,
                    distance: '0.0 mi (You)'
                };
                setFeed([newPost, ...feed]);
                setCurrentView('feed');
            };

            const HeaderNav = () => (
                <div className="w-full max-w-4xl mx-auto flex justify-between items-center mb-12 border-b border-zinc-800 pb-4">
                    <button onClick={() => setCurrentView('home')} className="text-gray-400 hover:text-white flex items-center gap-2 transition-colors font-medium">
                        <ArrowLeft size={20} /> Back
                    </button>
                    <h2 className="text-2xl font-black tracking-tighter text-emerald-500" style={{ textShadow: '0 0 10px #10b981' }}>HJN</h2>
                    <button onClick={() => setCurrentView('feed')} className="text-gray-400 hover:text-white flex items-center gap-2 transition-colors font-medium">
                        Live Feed <Zap size={20} className="text-yellow-500" />
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen bg-black text-gray-100 flex flex-col items-center px-6 py-12 font-sans">
                    <style>{`
                        @keyframes pulse-neon { 0%, 100% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; } 50% { text-shadow: 0 0 25px #10b981, 0 0 50px #059669; } }
                        .animate-neon { animation: pulse-neon 2.5s infinite; }
                        @keyframes pulse-neon-sky { 0%, 100% { text-shadow: 0 0 10px #0ea5e9, 0 0 20px #0ea5e9; } 50% { text-shadow: 0 0 25px #0ea5e9, 0 0 50px #0284c7; } }
                        .animate-neon-sky { animation: pulse-neon-sky 2.5s infinite; }
                    `}</style>

                    {currentView === 'home' && (
                        <div className="flex flex-col items-center justify-center flex-grow w-full max-w-4xl">
                            <header className="text-center mb-16">
                                <h1 className="text-5xl md:text-7xl font-black tracking-tighter text-emerald-500 animate-neon mb-4">HereJustNow.com</h1>
                                <p className="text-lg md:text-xl font-medium text-emerald-400 flex items-center justify-center gap-2"><MapPin size={24} /> Hyper-local drops. Real-time matching. Zero tracking.</p>
                            </header>
                            <main className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                                <button onClick={() => setCurrentView('seller')} className="bg-zinc-900/50 border-2 border-emerald-500/30 p-8 rounded-3xl text-center hover:border-emerald-500 transition-all group flex flex-col justify-between">
                                    <div>
                                        <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">💰</div>
                                        <h2 className="text-2xl font-black text-emerald-400 mb-2 uppercase italic">I HAVE...</h2>
                                        <p className="text-gray-400 text-sm mb-6 font-medium">Post your 60-minute anchor for the neighborhood.</p>
                                    </div>
                                    <div className="w-full bg-emerald-600 text-black font-black py-4 rounded-xl flex items-center justify-center gap-2"><PlusCircle size={20} /> POST A DROP</div>
                                </button>
                                <button onClick={() => setCurrentView('buyer')} className="bg-zinc-900/50 border-2 border-sky-500/30 p-8 rounded-3xl text-center hover:border-sky-500 transition-all group flex flex-col justify-between">
                                    <div>
                                        <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">🔍</div>
                                        <h2 className="text-2xl font-black text-sky-400 mb-2 uppercase italic">I NEED...</h2>
                                        <p className="text-gray-400 text-sm mb-6 font-medium">Shout out what you're looking for right now.</p>
                                    </div>
                                    <div className="w-full bg-sky-600 text-black font-black py-4 rounded-xl flex items-center justify-center gap-2"><Search size={20} /> POST A SHOUT</div>
                                </button>
                            </main>
                        </div>
                    )}

                    {currentView === 'seller' && (
                        <div className="w-full max-w-2xl flex-grow">
                            <HeaderNav />
                            <div className="bg-zinc-900/80 border-2 border-emerald-500/50 rounded-3xl p-8">
                                <h1 className="text-4xl font-black text-emerald-500 animate-neon mb-2 uppercase italic">Post a Drop</h1>
                                <form onSubmit={(e) => handlePost('drop', e)} className="space-y-6">
                                    <input required name="title" placeholder="What do you have?" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-emerald-500" />
                                    <textarea required name="desc" placeholder="Details..." className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-emerald-500"></textarea>
                                    <input required name="price" placeholder="Price / Terms" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-emerald-500" />
                                    <button type="submit" className="w-full bg-emerald-600 text-black font-black py-4 rounded-xl flex justify-center items-center gap-2"><Clock size={20} /> START 60-MINUTE ANCHOR</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {currentView === 'buyer' && (
                        <div className="w-full max-w-2xl flex-grow">
                            <HeaderNav />
                            <div className="bg-zinc-900/80 border-2 border-sky-500/50 rounded-3xl p-8">
                                <h1 className="text-4xl font-black text-sky-400 animate-neon-sky mb-2 uppercase italic">Post a Shout</h1>
                                <form onSubmit={(e) => handlePost('shout', e)} className="space-y-6">
                                    <input required name="title" placeholder="What do you need?" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-sky-500" />
                                    <textarea required name="desc" placeholder="Details..." className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-sky-500"></textarea>
                                    <input required name="price" placeholder="Reward / Offer" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none focus:border-sky-500" />
                                    <button type="submit" className="w-full bg-sky-600 text-black font-black py-4 rounded-xl flex justify-center items-center gap-2"><Clock size={20} /> SHOUT FOR 60 MINUTES</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {currentView === 'feed' && (
                        <div className="w-full max-w-4xl flex-grow">
                            <HeaderNav />
                            <h1 className="text-4xl font-black text-white uppercase mb-8 flex items-center gap-3">Live Radar <div className="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div></h1>
                            <div className="space-y-4">
                                {feed.map((item) => (
                                    <div key={item.id} className={`p-6 rounded-2xl border-l-4 bg-zinc-900/40 border-zinc-800 flex justify-between items-center ${item.type === 'drop' ? 'border-emerald-500' : 'border-sky-500'}`}>
                                        <div>
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className={`text-xs font-black uppercase px-2 py-1 rounded ${item.type === 'drop' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-sky-500/20 text-sky-400'}`}>{item.type.toUpperCase()}</span>
                                                <h3 className="text-xl font-bold text-white">{item.title}</h3>
                                            </div>
                                            <p className="text-gray-400 text-sm">{item.desc}</p>
                                        </div>
                                        <div className="text-center p-4 rounded-xl bg-zinc-950 text-gray-300">
                                            <div className="text-3xl font-black leading-none">{item.time}</div>
                                            <div className="text-[10px] uppercase tracking-widest mt-1">Mins Left</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    <footer className="mt-auto pt-16 text-center text-[10px] text-gray-600 uppercase tracking-[0.2em] font-bold">We only want you to be here, just now.</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
