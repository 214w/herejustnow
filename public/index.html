<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HereJustNow | Live. Local. Gone.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, size = 24 }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    setSvg(window.lucide.icons[name].toSvg({ width: size, height: size }));
                }
            }, [name, size]);
            return svg ? <span dangerouslySetInnerHTML={{ __html: svg }} /> : <span>📍</span>;
        };
        const MapPin = (p) => <Icon name="MapPin" {...p} />;
        const Clock = (p) => <Icon name="Clock" {...p} />;
        const ArrowLeft = (p) => <Icon name="ArrowLeft" {...p} />;
        const Zap = (p) => <Icon name="Zap" {...p} />;
        const PlusCircle = (p) => <Icon name="PlusCircle" {...p} />;
        const Search = (p) => <Icon name="Search" {...p} />;

        function App() {
          const [currentView, setCurrentView] = useState('home');
          const [feed, setFeed] = useState([
            { id: 1, type: 'drop', title: 'Fresh Sourdough Loaves', desc: 'Warm loaves ready now.', price: '$8', time: 54, distance: '0.1 mi' },
            { id: 2, type: 'shout', title: 'Need a jumpstart', desc: 'Dead battery at CVS.', price: '$20 tip', time: 42, distance: '0.3 mi' }
          ]);

          const handlePost = (type, e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newPost = { id: Date.now(), type, title: formData.get('title'), desc: formData.get('desc'), price: formData.get('price'), time: 60, distance: 'You' };
            setFeed([newPost, ...feed]);
            setCurrentView('feed');
          };

          const HeaderNav = () => (
            <div className="w-full max-w-4xl mx-auto flex justify-between items-center mb-12 border-b border-zinc-800 pb-4">
              <button onClick={() => setCurrentView('home')} className="text-gray-400 hover:text-white flex items-center gap-2"> <ArrowLeft size={20} /> Back </button>
              <h2 className="text-2xl font-black text-emerald-500 italic">HJN</h2>
              <button onClick={() => setCurrentView('feed')} className="text-gray-400 hover:text-white flex items-center gap-2"> Live Feed <Zap size={20} /> </button>
            </div>
          );

          return (
            <div className="min-h-screen bg-black text-gray-100 flex flex-col items-center px-6 py-12">
              <style>{`
                @keyframes pulse-neon { 0%, 100% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; } 50% { text-shadow: 0 0 25px #10b981, 0 0 50px #059669; } }
                .animate-neon { animation: pulse-neon 2s infinite; }
              `}</style>
                {currentView === 'home' && (
                <div className="flex flex-col items-center justify-center flex-grow w-full max-w-4xl">
                  <header className="text-center mb-16">
                    <h1 className="text-5xl font-black text-emerald-500 animate-neon mb-4">HereJustNow.com</h1>
                    <p className="text-lg font-medium text-emerald-400">📍 Hyper-local drops. Real-time matching. Zero tracking.</p>
                  </header>
                  <main className="w-full grid grid-cols-1 md:grid-cols-2 gap-8">
                    <button onClick={() => setCurrentView('seller')} className="bg-zinc-900/50 border-2 border-emerald-500/30 p-8 rounded-3xl hover:border-emerald-500">
                      <div className="text-5xl mb-4">💰</div>
                      <h2 className="text-2xl font-black text-emerald-400 mb-2 uppercase">I HAVE...</h2>
                      <div className="bg-emerald-600 text-black font-black py-4 rounded-xl mt-4">POST A DROP</div>
                    </button>
                    <button onClick={() => setCurrentView('buyer')} className="bg-zinc-900/50 border-2 border-sky-500/30 p-8 rounded-3xl hover:border-sky-500">
                      <div className="text-5xl mb-4">🔍</div>
                      <h2 className="text-2xl font-black text-sky-400 mb-2 uppercase">I NEED...</h2>
                      <div className="bg-sky-600 text-black font-black py-4 rounded-xl mt-4">POST A SHOUT</div>
                    </button>
                  </main>
                </div>
              )}

              {currentView === 'seller' && (
                <div className="w-full max-w-2xl flex-grow">
                  <HeaderNav />
                  <div className="bg-zinc-900/80 border-2 border-emerald-500/50 rounded-3xl p-8">
                    <h1 className="text-4xl font-black text-emerald-500 animate-neon mb-8">Post a Drop</h1>
                    <form onSubmit={(e) => handlePost('drop', e)} className="space-y-6">
                      <input required name="title" placeholder="What do you have?" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white" />
                      <textarea required name="desc" placeholder="Details..." className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white"></textarea>
                      <input required name="price" placeholder="Price" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white" />
                      <button type="submit" className="w-full bg-emerald-600 text-black font-black py-4 rounded-xl">START ANCHOR</button>
                    </form>
                  </div>
                </div>
              )}

              {currentView === 'feed' && (
                <div className="w-full max-w-4xl flex-grow">
                  <HeaderNav />
                  <h1 className="text-4xl font-black text-white uppercase mb-8 flex items-center gap-3">Live Radar <div className="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div></h1>
                  <div className="space-y-4">
                    {feed.map((item) => (
                      <div key={item.id} className={`p-6 rounded-2xl border-l-4 bg-zinc-900/40 border-zinc-800 flex justify-between items-center ${item.type === 'drop' ? 'border-emerald-500' : 'border-sky-500'}`}>
                        <div>
                          <h3 className="text-xl font-bold text-white">{item.title}</h3>
                          <p className="text-gray-400 text-sm">{item.desc}</p>
                        </div>
                        <div className="text-center p-4 rounded-xl bg-zinc-950 text-gray-300">
                          <div className="text-3xl font-black leading-none">{item.time}</div>
                          <div className="text-[10px] uppercase tracking-widest mt-1">Mins Left</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <footer className="mt-auto pt-16 text-center text-xs text-gray-600 uppercase tracking-widest">We only want you to be here, just now.</footer>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
