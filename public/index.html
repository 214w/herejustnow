<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HereJustNow | Live. Local. Gone.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Mock icons since we are in a browser environment
        const MapPin = () => <span>📍</span>;
        const Clock = () => <span>🕒</span>;
        const ArrowLeft = () => <span>←</span>;
        const Zap = () => <span>⚡</span>;
        const PlusCircle = () => <span>+</span>;
        const Search = () => <span>🔍</span>;

        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [feed, setFeed] = useState([
                { id: 1, type: 'drop', title: 'Fresh Sourdough Loaves', desc: 'Just pulled 4 loaves out of the oven.', price: '$8/each', time: 54, distance: '0.1 mi' },
                { id: 2, type: 'shout', title: 'Need a jumpstart ASAP', desc: 'Car battery died at CVS.', price: 'Will tip $20', time: 42, distance: '0.3 mi' }
            ]);

            const handlePost = (type, e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newPost = {
                    id: Date.now(),
                    type: type,
                    title: formData.get('title'),
                    desc: formData.get('desc'),
                    price: formData.get('price'),
                    time: 60,
                    distance: '0.0 mi (You)'
                };
                setFeed([newPost, ...feed]);
                setCurrentView('feed');
            };

            const HeaderNav = () => (
                <div className="w-full max-w-4xl mx-auto flex justify-between items-center mb-12 border-b border-zinc-800 pb-4">
                    <button onClick={() => setCurrentView('home')} className="text-gray-400 hover:text-white flex items-center gap-2 transition-colors font-medium">← Back</button>
                    <h2 className="text-2xl font-black tracking-tighter text-emerald-500">HJN</h2>
                    <button onClick={() => setCurrentView('feed')} className="text-gray-400 hover:text-white flex items-center gap-2 transition-colors font-medium">Live Feed ⚡</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-black text-gray-100 flex flex-col items-center px-6 py-12 font-sans">
                    {currentView === 'home' && (
                        <div className="flex flex-col items-center justify-center flex-grow w-full max-w-4xl">
                            <header className="text-center mb-16">
                                <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-emerald-500 mb-4">HereJustNow.com</h1>
                                <p class="text-lg md:text-xl font-medium text-emerald-400 flex items-center justify-center gap-2">📍 Hyper-local drops. Real-time matching. Zero tracking.</p>
                            </header>
                            <main className="w-full grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                                <button onClick={() => setCurrentView('seller')} className="bg-zinc-900/50 border-2 border-emerald-500/30 p-8 rounded-3xl text-center hover:border-emerald-500 transition-all">
                                    <div className="text-5xl mb-4">💰</div>
                                    <h2 className="text-2xl font-black text-emerald-400 mb-2 uppercase italic">I HAVE...</h2>
                                    <div className="w-full bg-emerald-600 text-black font-black py-4 rounded-xl mt-4">POST A DROP</div>
                                </button>
                                <button onClick={() => setCurrentView('buyer')} className="bg-zinc-900/50 border-2 border-sky-500/30 p-8 rounded-3xl text-center hover:border-sky-500 transition-all">
                                    <div className="text-5xl mb-4">🔍</div>
                                    <h2 className="text-2xl font-black text-sky-400 mb-2 uppercase italic">I NEED...</h2>
                                    <div className="w-full bg-sky-600 text-black font-black py-4 rounded-xl mt-4">POST A SHOUT</div>
                                </button>
                            </main>
                        </div>
                    )}

                    {currentView === 'seller' && (
                        <div className="w-full max-w-2xl flex-grow">
                            <HeaderNav />
                            <div className="bg-zinc-900/80 border-2 border-emerald-500/50 rounded-3xl p-8">
                                <h1 className="text-4xl font-black text-emerald-500 mb-8 uppercase italic">Post a Drop</h1>
                                <form onSubmit={(e) => handlePost('drop', e)} className="space-y-6">
                                    <input required name="title" placeholder="What do you have?" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none" />
                                    <textarea required name="desc" placeholder="Details..." className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none"></textarea>
                                    <input required name="price" placeholder="Price" className="w-full bg-black border border-zinc-700 rounded-xl p-4 text-white outline-none" />
                                    <button type="submit" className="w-full bg-emerald-600 text-black font-black py-4 rounded-xl">START ANCHOR</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {currentView === 'feed' && (
                        <div className="w-full max-w-4xl flex-grow">
                            <HeaderNav />
                            <div className="flex justify-between items-end mb-8">
                                <h1 className="text-4xl font-black text-white uppercase tracking-tight">Live Radar 🔴</h1>
                            </div>
                            <div className="space-y-4">
                                {feed.map((item) => (
                                    <div key={item.id} className={`p-6 rounded-2xl border-l-4 bg-zinc-900/40 border-zinc-800 flex justify-between items-center ${item.type === 'drop' ? 'border-emerald-500' : 'border-sky-500'}`}>
                                        <div>
                                            <h3 className="text-xl font-bold text-white">{item.title}</h3>
                                            <p className="text-gray-400 text-sm">{item.desc}</p>
                                        </div>
                                        <div className="text-center p-4 rounded-xl bg-zinc-950 text-gray-300">
                                            <div className="text-3xl font-black leading-none">{item.time}</div>
                                            <div className="text-[10px] uppercase tracking-widest mt-1">Mins</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
