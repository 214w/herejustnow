<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | HereJustNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000000; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col p-6 items-center">
    <header class="w-full max-w-md flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black text-emerald-500 tracking-tighter">HereJustNow</h1>
        <div class="text-xs font-bold text-gray-500 uppercase">Seller Portal</div>
    </header>
    <main class="w-full max-w-md space-y-8">
        <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl">
            <h2 class="text-lg font-bold mb-4 text-white">1. Store Setup</h2>
            <input type="text" placeholder="Store Name" class="w-full bg-black border border-zinc-800 p-3 rounded-lg focus:border-emerald-500 outline-none mb-4 text-white">
            <button class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-2 rounded-lg transition-colors">Save Profile</button>
        </section>
        <button class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-black py-4 px-8 rounded-full transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(16,185,129,0.4)]">GO LIVE (1 HOUR) 📍</button>
    </main>
    <footer class="mt-12 text-center"><a href="index.html" class="text-gray-500 text-xs hover:text-emerald-500 transition-colors uppercase tracking-widest font-bold">← Back to Home</a></footer>
</body>
</html>
